# Build and publish static site to the gh-pages branch.
# Settings → Pages: deploy from branch gh-pages / (root).
# Secret ARTIFACTORY_NPM_TOKEN: required for @wexinc-healthbenefits (see .npmrc) until a public UI path exists.

name: GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - name: Configure npm for private scope
        env:
          NPM_TOKEN: ${{ secrets.ARTIFACTORY_NPM_TOKEN }}
          # Optional repo variable: set to benefits-npm-prod if your token only resolves packages there.
          BENEFITS_NPM_REPO: ${{ vars.ARTIFACTORY_BENEFITS_NPM_REPO }}
        run: |
          if [ -z "${NPM_TOKEN}" ]; then
            echo "::error::Add repository secret ARTIFACTORY_NPM_TOKEN (matches local Artifactory npm auth for @wexinc-healthbenefits)."
            exit 1
          fi
          REPO="${BENEFITS_NPM_REPO:-benefits-npm}"
          REG_URL="https://usartifactorywexinc.jfrog.io/artifactory/api/npm/${REPO}/"
          echo "Using Artifactory npm virtual repo: ${REPO}"
          npm config set registry https://registry.npmjs.org/
          npm config set @wexinc-healthbenefits:registry "${REG_URL}"
          npm config set "//usartifactorywexinc.jfrog.io/artifactory/api/npm/${REPO}/:_authToken" "${NPM_TOKEN}"
          npm config set "//usartifactorywexinc.jfrog.io/artifactory/api/npm/${REPO}/:always-auth" true

      - name: Install dependencies
        # npm install (not npm ci): lockfile may omit integrity for Artifactory tarballs; install still respects package-lock.
        run: npm install --ignore-scripts --no-audit --no-fund

      - name: Build
        run: npm run build

      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: ./dist
          user_name: 'github-actions[bot]'
          user_email: 'github-actions[bot]@users.noreply.github.com'
          commit_message: 'Deploy GitHub Pages: ${{ github.sha }}'
