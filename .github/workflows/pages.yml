# Build and publish static site to the gh-pages branch.
# Settings → Pages: deploy from branch gh-pages / (root).
#
# Secrets: ARTIFACTORY_NPM_TOKEN (JFrog identity token for npm).
# Optional Variables: ARTIFACTORY_BENEFITS_NPM_REPO = benefits-npm-prod if non-prod repo fails.

name: GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: package-lock.json

      - name: Write .npmrc for CI
        env:
          ARTIFACTORY_NPM_TOKEN: ${{ secrets.ARTIFACTORY_NPM_TOKEN }}
          BENEFITS_NPM_REPO: ${{ vars.ARTIFACTORY_BENEFITS_NPM_REPO }}
        shell: bash
        run: |
          set -euo pipefail
          if [[ -z "${ARTIFACTORY_NPM_TOKEN}" ]]; then
            echo "::error::Add repository secret ARTIFACTORY_NPM_TOKEN (Settings → Secrets and variables → Actions)."
            exit 1
          fi
          REPO="${BENEFITS_NPM_REPO:-benefits-npm}"
          echo "Using Artifactory npm virtual repo: ${REPO}"
          # Replace project .npmrc so the token is applied reliably (no \${VAR} expansion quirks).
          {
            echo "registry=https://registry.npmjs.org/"
            echo "@wexinc-healthbenefits:registry=https://usartifactorywexinc.jfrog.io/artifactory/api/npm/${REPO}/"
            echo "//usartifactorywexinc.jfrog.io/artifactory/api/npm/${REPO}/:_authToken=${ARTIFACTORY_NPM_TOKEN}"
            echo "//usartifactorywexinc.jfrog.io/artifactory/api/npm/${REPO}/:always-auth=true"
          } > .npmrc

      - name: Install dependencies
        run: npm install --ignore-scripts --no-audit --no-fund --legacy-peer-deps

      - name: Build
        run: npm run build

      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: ./dist
          user_name: "github-actions[bot]"
          user_email: "github-actions[bot]@users.noreply.github.com"
          commit_message: "Deploy GitHub Pages: ${{ github.sha }}"
