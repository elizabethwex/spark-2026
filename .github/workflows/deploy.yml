name: Deploy to GitHub Pages

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write
  id-token: write

jobs:
  build-and-deploy:
    # WEX org only: uses JFrog OIDC. Personal forks use github-pages.yml instead.
    if: github.repository == 'wex-benefits/spark-2026'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: JFrog Config Clear
        run: |
          echo "Clearing JFrog CLI configuration"
          rm -rf ~/.jfrog

      - name: Create Unique JFrog CLI Server ID
        id: jfrog-cli-server-id
        run: |
          export JFROG_CLI_SERVER_ID=$(uuidgen)
          echo "Created JFrog CLI Server ID: ${JFROG_CLI_SERVER_ID}"
          echo "JFROG_CLI_SERVER_ID=${JFROG_CLI_SERVER_ID}" | tee -a $GITHUB_ENV
          echo "result=${JFROG_CLI_SERVER_ID}" | tee -a $GITHUB_OUTPUT

      - name: Setup JFrog CLI
        id: jfrog-token
        uses: jfrog/setup-jfrog-cli@v4
        env:
          JF_URL: https://usartifactorywexinc.jfrog.io
        with:
          oidc-provider-name: github-oidc
          custom-server-id: ${{ steps.jfrog-cli-server-id.outputs.result }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Configure npm for CI with WEX Artifactory
        env:
          NPM_TOKEN: ${{ steps.jfrog-token.outputs.oidc-token }}
        run: |
          echo "Configuring npm for WEX Artifactory..."
          npm config set registry https://usartifactorywexinc.jfrog.io/artifactory/api/npm/benefits-npm/
          npm config set @wexinc-healthbenefits:registry https://usartifactorywexinc.jfrog.io/artifactory/api/npm/benefits-npm/
          npm config set //usartifactorywexinc.jfrog.io/artifactory/api/npm/benefits-npm/:_authToken "${NPM_TOKEN}"
          echo "npm configuration complete"

      - name: Install dependencies
        env:
          NODE_AUTH_TOKEN: ${{ steps.jfrog-token.outputs.oidc-token }}
          NPM_TOKEN: ${{ steps.jfrog-token.outputs.oidc-token }}
        run: npm ci --ignore-scripts
      
      - name: Build
        run: npm run build
      
      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v3
        if: github.ref == 'refs/heads/main'
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: ./dist
          cname: false
          user_name: 'github-actions[bot]'
          user_email: 'github-actions[bot]@users.noreply.github.com'
          commit_message: 'Deploy to GitHub Pages: ${{ github.sha }}'

